<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome - NutriSnap</title>
<link rel="stylesheet" href="css/style.css">
<style>
.welcome-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle at top right, rgba(232,245,232,0.8), transparent 60%),
              radial-gradient(circle at bottom left, rgba(250,250,250,1), transparent 60%);
  padding: 2rem;
}
.welcome-card {
  background: white;
  border-radius: 24px;
  padding: 4rem 3rem;
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
  text-align: center;
  max-width: 500px;
  width: 100%;
  border: 1px solid rgba(224,224,224,0.5);
}
.welcome-logo {
  width: 100px;
  height: 100px;
  border-radius: 20px;
  margin-bottom: 1.5rem;
  box-shadow: 0 8px 24px rgba(76,175,80,0.2);
}
.welcome-title {
  font-size: 2.5rem;
  font-weight: 800;
  color: var(--primary-green);
  margin-bottom: 1rem;
  letter-spacing: -0.5px;
}
.welcome-subtitle {
  color: var(--text-light);
  font-size: 1.1rem;
  margin-bottom: 3rem;
}
.welcome-buttons {
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}
.btn-full {
  width: 100%;
  padding: 16px;
  font-size: 1.1rem;
}

/* Modal overlay */
#registerModal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
#registerModal.open {
  display: flex;
}
.modal-card {
  background: white;
  border-radius: 24px;
  padding: 3rem;
  width: 100%;
  max-width: 450px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  position: relative;
  animation: popIn 0.25s ease;
}
@keyframes popIn {
  from { opacity:0; transform:scale(0.92) translateY(20px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
.modal-close {
  position: absolute;
  top: 1.2rem;
  right: 1.5rem;
  background: none;
  border: none;
  font-size: 1.6rem;
  cursor: pointer;
  color: var(--text-light);
  line-height: 1;
}
.modal-close:hover { color: var(--text-dark); }
.modal-title {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 0.4rem;
}
.modal-subtitle {
  color: var(--text-light);
  margin-bottom: 2rem;
  font-size: 0.95rem;
}
</style>
</head>
<body>

<!-- Welcome Card -->
<div class="welcome-container">
  <div class="welcome-card fade-in-up">
    <img src="images/logo.jpg" alt="NutriSnap Logo" class="welcome-logo">
    <h1 class="welcome-title">NutriSnap</h1>
    <p class="welcome-subtitle">Your personal AI nutrition assistant and daily diet companion.</p>

    <div class="welcome-buttons">
      <button id="openRegisterBtn" class="btn btn-primary btn-full">Create Account</button>
      <a href="login.html" class="btn btn-outline btn-full">Login / Sign In</a>
      <a href="index.html" id="guestBtn" class="btn btn-outline btn-full" style="color:var(--text-light);border-color:var(--border-light)">Continue as Guest</a>
    </div>
  </div>
</div>

<!-- Register Modal -->
<div id="registerModal">
  <div class="modal-card">
    <button class="modal-close" id="closeModal">&times;</button>
    <h2 class="modal-title">Create an Account</h2>
    <p class="modal-subtitle">Join NutriSnap to start tracking your diet journey.</p>

    <div class="form-group">
      <label class="form-label" for="reg-email">Email Address</label>
      <input type="email" id="reg-email" class="form-input" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label" for="reg-password">Password</label>
      <input type="password" id="reg-password" class="form-input" placeholder="Password (min 4 characters)">
    </div>
    <button id="regSubmitBtn" class="btn btn-primary" style="width:100%;margin-top:0.5rem">Sign Up</button>

    <p style="text-align:center;margin-top:1.5rem;font-size:0.9rem">
      Already have an account?
      <a href="login.html" style="color:var(--primary-green);font-weight:600;text-decoration:none">Sign in here</a>
    </p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script>
// Redirect if already logged in
document.addEventListener('DOMContentLoaded', function() {
  if (localStorage.getItem('nutrisnap_auth') === 'true') {
    window.location.href = 'index.html';
  }
});

// Guest button
document.getElementById('guestBtn').addEventListener('click', function(e) {
  e.preventDefault();
  localStorage.setItem('nutrisnap_auth', 'guest');
  window.location.href = 'index.html';
});

// Open register modal
document.getElementById('openRegisterBtn').addEventListener('click', function() {
  document.getElementById('registerModal').classList.add('open');
  document.getElementById('reg-email').focus();
});

// Close modal
document.getElementById('closeModal').addEventListener('click', function() {
  document.getElementById('registerModal').classList.remove('open');
});

// Close modal when clicking outside the card
document.getElementById('registerModal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});

// Close on Escape key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('registerModal').classList.remove('open');
});

// Register form submit
document.getElementById('regSubmitBtn').addEventListener('click', async function() {
  var email = document.getElementById('reg-email').value.trim();
  var password = document.getElementById('reg-password').value;
  var btn = document.getElementById('regSubmitBtn');

  if (!email || !password) {
    NutriSnapUtils.showNotification('Please fill in all fields', 'error');
    return;
  }
  if (password.length < 4) {
    NutriSnapUtils.showNotification('Password must be at least 4 characters', 'error');
    return;
  }

  NutriSnapUtils.showLoading(btn, 'Creating Account...');
  try {
    var data = await NutriSnapUtils.apiFetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    });

    localStorage.setItem('nutrisnap_token', data.token);
    localStorage.setItem('nutrisnap_auth', 'true');
    localStorage.setItem('nutrisnap_user_email', data.email);

    NutriSnapUtils.showNotification('Account created! Redirecting...', 'success');
    setTimeout(function() { window.location.href = 'onboarding.html'; }, 1200);
  } catch (err) {
    NutriSnapUtils.hideLoading(btn);
    NutriSnapUtils.showNotification(err.message || 'Registration failed', 'error');
  }
});
</script>
</body>
</html>
