<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Your Goal - NutriSnap</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .onboarding-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--light-green);
            padding: 3rem 1rem;
        }

        .onboarding-card {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 600px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            gap: 1rem;
        }

        .step-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--border-light);
            transition: all 0.3s ease;
        }

        .step-dot.active {
            background: var(--primary-green);
            transform: scale(1.2);
        }

        #result-section {
            display: none;
            text-align: center;
        }

        .calorie-box {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.1), rgba(33, 150, 243, 0.1));
            border: 2px solid var(--primary-green);
            border-radius: 16px;
            padding: 2rem;
            margin: 2rem 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .calorie-stat {
            flex: 1;
            min-width: 150px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-dark);
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>

    <div class="onboarding-container">
        <div class="onboarding-card fade-in-up">
            
            <div class="step-indicator" id="stepIndicator">
                <div class="step-dot active"></div>
                <div class="step-dot"></div>
            </div>

            <!-- STEP 1: Form -->
            <div id="form-section">
                <h1 style="text-align: center;">Let's Personalize Your Journey</h1>
                <p style="text-align: center; margin-bottom: 2rem;">Tell us a little about yourself to get started.</p>

                <form id="onboardingForm">
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label" for="weight">Weight (kg)</label>
                            <input type="number" id="weight" class="form-input" placeholder="e.g. 70" required min="30" max="300">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="height">Height (cm)</label>
                            <input type="number" id="height" class="form-input" placeholder="e.g. 175" required min="100" max="250">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="goal">Primary Medical / Health Goal</label>
                        <select id="goal" class="form-select" required>
                            <option value="" disabled selected>Select an option...</option>
                            <option value="weight-loss">Weight Loss</option>
                            <option value="weight-gain">Weight Gain</option>
                            <option value="pcod">PCOD / PCOS Management</option>
                            <option value="diabetes">Diabetes / Blood Sugar Control</option>
                            <option value="cholesterol">Cholesterol / High BP</option>
                            <option value="maintenance">General Maintenance / Healthy Lifestyle</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="activity">Activity Level</label>
                        <select id="activity" class="form-select" required>
                            <option value="sedentary">Sedentary (Little to no exercise)</option>
                            <option value="light" selected>Lightly active (Light exercise 1-3 days/wk)</option>
                            <option value="moderate">Moderately active (Moderate exercise 3-5 days/wk)</option>
                            <option value="active">Very active (Hard exercise 6-7 days/wk)</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Calculate My Plan</button>
                </form>
            </div>

            <!-- STEP 2: Results -->
            <div id="result-section">
                <h1>Your Personalized Plan is Ready! 🎉</h1>
                <p>Based on your profile, here is your daily target to achieve your <span id="display-goal" style="font-weight:bold; color:var(--primary-green);"></span> goal safely.</p>
                
                <div class="calorie-box">
                    <div class="calorie-stat">
                        <div style="color: var(--text-light); font-weight: 600; text-transform: uppercase; font-size: 0.85rem;">Daily Intake</div>
                        <div class="stat-value" id="display-intake">2000</div>
                        <div style="color: var(--text-light); font-size: 0.9rem;">kcal to consume</div>
                    </div>
                    
                    <div style="width: 2px; background: rgba(0,0,0,0.1); border-radius: 2px;"></div>

                    <div class="calorie-stat">
                        <div style="color: var(--text-light); font-weight: 600; text-transform: uppercase; font-size: 0.85rem;">Daily Burn Target</div>
                        <div class="stat-value" id="display-burn" style="color: var(--warning-orange);">400</div>
                        <div style="color: var(--text-light); font-size: 0.9rem;">kcal active burn</div>
                    </div>
                </div>

                <button id="startJourneyBtn" class="btn btn-primary" style="width: 100%;">Start My Journey Now 🚀</button>
            </div>

        </div>
    </div>

    <script src="js/config.js"></script>
<script src="js/utils.js"></script>
    <script>
        document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = e.target.querySelector('button[type="submit"]');
            NutriSnapUtils.showLoading(submitBtn, 'Analyzing Profile...');

            // 1. Gather Data
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const goalEl = document.getElementById('goal');
            const goal = goalEl.value;
            const goalText = goalEl.options[goalEl.selectedIndex].text;
            const activity = document.getElementById('activity').value;

            // 2. Simple BMR Calculation (Mifflin-St Jeor generic average)
            let bmr = (10 * weight) + (6.25 * height) - (5 * 30) + 5; 

            let activityMultiplier = 1.2;
            if (activity === 'light') activityMultiplier = 1.375;
            if (activity === 'moderate') activityMultiplier = 1.55;
            if (activity === 'active') activityMultiplier = 1.725;

            let tdee = bmr * activityMultiplier; 

            // 3. Adjust based on Goal
            let targetIntake = tdee;
            let targetBurn = 300; 

            if (goal === 'weight-loss') {
                targetIntake = tdee - 500; 
                targetBurn = 450;
            } else if (goal === 'weight-gain') {
                targetIntake = tdee + 500; 
                targetBurn = 250; 
            } else if (goal === 'pcod' || goal === 'diabetes' || goal === 'cholesterol') {
                targetIntake = tdee - 200; 
                targetBurn = 400;
            } else {
                targetIntake = tdee; 
                targetBurn = 350;
            }

            if (targetIntake < 1200) targetIntake = 1200;

            targetIntake = Math.round(targetIntake);
            targetBurn = Math.round(targetBurn);

            // 4. Send Data to Backend Profile Sync
            const profileData = {
                weight, 
                height, 
                goal, 
                activityLevel: activity === 'light' ? 'lightly-active' : (activity === 'active' ? 'very-active' : 'sedentary')
            };

            try {
                // Sync with DB
                await NutriSnapUtils.apiFetch('/auth/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(profileData)
                });
                
                NutriSnapUtils.hideLoading(submitBtn);

                // LocalStorage purely for fast frontend referencing
                const cachedProfile = {
                    ...profileData, 
                    targetIntake, 
                    targetBurn,
                    startDate: new Date().toISOString()
                };
                NutriSnapUtils.saveToLocalStorage('nutrisnap_profile', cachedProfile);
                NutriSnapUtils.saveToLocalStorage('nutrisnap_onboarding_completed', 'true');
                
                if (!localStorage.getItem('nutrisnap_journey')) {
                    NutriSnapUtils.saveToLocalStorage('nutrisnap_journey', []);
                }

                // 5. Update UI
                document.getElementById('display-goal').textContent = goalText;
                document.getElementById('display-intake').textContent = targetIntake;
                document.getElementById('display-burn').textContent = targetBurn;

                document.getElementById('form-section').style.display = 'none';
                document.getElementById('result-section').style.display = 'block';

                const dots = document.querySelectorAll('.step-dot');
                dots[0].classList.remove('active');
                dots[1].classList.add('active');

            } catch(error) {
                NutriSnapUtils.hideLoading(submitBtn);
                NutriSnapUtils.showNotification(error.message, 'error');
            }
        });

        document.getElementById('startJourneyBtn').addEventListener('click', () => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
