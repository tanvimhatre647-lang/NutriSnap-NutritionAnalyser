<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - NutriSnap</title>
<link rel="stylesheet" href="css/style.css">
<style>
.auth-container{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at top right,rgba(232,245,232,0.8),transparent 60%);padding:2rem}
.auth-card{background:white;border-radius:24px;padding:3rem;box-shadow:0 20px 50px rgba(0,0,0,0.08);width:100%;max-width:450px;border:1px solid rgba(224,224,224,0.5)}
.back-link{display:inline-block;color:var(--text-light);text-decoration:none;margin-bottom:2rem;font-weight:500}
.back-link:hover{color:var(--primary-green)}
.auth-title{font-size:2rem;font-weight:700;margin-bottom:0.5rem;color:var(--text-dark)}
.auth-subtitle{color:var(--text-light);margin-bottom:2rem}
</style>
</head>
<body>
<div class="auth-container">
  <div class="auth-card">
    <a href="welcome.html" class="back-link">Back</a>
    <h1 class="auth-title">Create an Account</h1>
    <p class="auth-subtitle">Join NutriSnap to start tracking your diet journey.</p>
    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <input type="email" id="email" class="form-input" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input type="password" id="password" class="form-input" placeholder="Password">
    </div>
    <button id="submitBtn" class="btn btn-primary" style="width:100%;margin-top:1rem">Sign Up</button>
    <p style="text-align:center;margin-top:2rem;font-size:0.9rem">
      Already have an account?
      <a href="login.html" style="color:var(--primary-green);font-weight:600;text-decoration:none">Sign in here</a>
    </p>
  </div>
</div>
<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script>
document.getElementById('submitBtn').addEventListener('click', async function() {
  var email = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  var btn = document.getElementById('submitBtn');

  if (!email || !password) {
    NutriSnapUtils.showNotification('Please fill in all fields', 'error');
    return;
  }
  if (password.length < 4) {
    NutriSnapUtils.showNotification('Password must be at least 4 characters', 'error');
    return;
  }

  NutriSnapUtils.showLoading(btn, 'Creating Account...');
  try {
    var data = await NutriSnapUtils.apiFetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, password: password })
    });
    localStorage.setItem('nutrisnap_token', data.token);
    localStorage.setItem('nutrisnap_auth', 'true');
    localStorage.setItem('nutrisnap_user_email', data.email);
    NutriSnapUtils.showNotification('Account created! Redirecting...', 'success');
    setTimeout(function() { window.location.href = 'onboarding.html'; }, 1200);
  } catch (err) {
    NutriSnapUtils.hideLoading(btn);
    NutriSnapUtils.showNotification(err.message || 'Registration failed', 'error');
  }
});
</script>
</body>
</html>
